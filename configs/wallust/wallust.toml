# wallust v4-alpha sample configuration
#
# Copy this file to ~/.config/wallust/wallust.toml to get started.
# All options are optional - wallust works fine with an empty config file.
#
# Documentation: https://explosion-mental.codeberg.page/wallust/
# Man page:      man wallust.5
# Migrating from v2/v3? run `wallust migrate`

# ~ Backend ~
# How the image is read to extract pixels. Faster backends trade some
# precision for speed. For most images the difference is invisible.
#   fastresize  SIMD-accelerated resize (default, recommended)
#   resized     standard resize, aspect ratio preserved
#   full        read every pixel - most precise, slowest
#   thumb       fixed 512×512 crop, fastest
#   wal         uses ImageMagick `convert`, like pywal
backend = "thumb"

# ~ Palette ~
# How extracted pixels are turned into a 16-color terminal scheme.
#   salience  perceptually prominent colors (default)
#   ansi      classic TTY layout: color1=red, color2=green, and so on
#   kmeans    k-means clustering in Lab color space
palette = "dark"

# ~ Style ~
# dark (default) - dark background, light foreground
# light          - light background, dark foreground
#style = "dark"

# ~ Salience options ~
# Only applies when palette = "salience".
#   sampling:  How colors are picked from the histogram
#              balanced(default), distributed, high, low
#   intensity: Shifts the palette toward softer or punchier colors
#              normal(default), pastel, vibrant
#salience = { sampling = "balanced", intensity = "normal" }

# ~ Kmeans options ~
# Only applies when palette = "kmeans".
#   k:         Number of color clusters (default: 16)
#   min_dist:  Minimum perceptual distance (delta E) between kept colors (default: 10.0)
#              raise to get more distinct colors, lower to keep more similar ones
#kmeans = { k = 16, min_dist = 10.0 }

# ~ 16-color mode ~
# Dims color8–color14 (the bold/bright row) to give the illusion of a fuller
# palette, usually terminals use those slots for bold text.
# use16cols = true

# ~ Contrast check ~
# Ensures a readable contrast between foreground and background.
# Leave disabled unless you frequently get unreadable output.
check_contrast = true

# ~ Saturation ~
# Nudge color saturation after palette generation. 1–100.
# Values above ~60 intensify colors; below ~40 mute them.
#saturation = 50

# ~ Alpha ~
# Exposes an `alpha` variable inside templates (e.g. for compositor opacity).
# Has no effect outside of templating. Default: 100 (fully opaque).
#alpha = 100

[templates]
# Render color variables into any config file. Use single quotes for paths
# to avoid backslash escaping (matters on Windows).
# Keys:
#   template  relative path inside ~/.config/wallust/  (the source)
#   target    absolute path where the result is written (the destination)
#   pywal     set to true to use {color0} pywal-style syntax instead of {{color0}}
#   max_depth only when template/target are directories - limits recursion depth
# Examples:
#   zathura  = { template = 'zathura',  target = '~/.config/zathura/zathurarc' }
#   dunst    = { template = 'dunst',    target = '~/.config/dunst/dunstrc' }
#   kitty    = { template = 'kitty',    target = '~/.config/kitty/kitty.conf' }
#   # directory: template every file inside src/ into dst/
#   glava    = { template = 'glava/',   target = '~/.config/glava/', max_depth = 1 }
#   # pywal compatibility
#   wal      = { template = 'wal/',     target = '~/.cache/wal/', pywal = true }

hypr = { src = 'hyprlua', dst = '~/.config/hypr/colors.lua' }
waybar = { src = 'colors.css', dst = '~/.config/waybar/colors.css' }
ironbar = { src = 'colors.css', dst = '~/.config/ironbar/colors.css' }
swaync = { src = 'colors.css', dst = '~/.config/swaync/colors.css' }
swayosd = { src = 'colors.css', dst = '~/.config/swayosd/colors.css' }
firefox = { src = 'colors.json', dst = '~/.cache/wal/colors.json' }
rasi = { src = 'colors.rasi', dst = '~/.config/rofi/colors.rasi' }
kitty = { src = 'kitty', dst = '~/.config/kitty/colors.conf' }
vscode = { src = 'vscode.json', dst = '~/.cache/wallust/colors.json' }
vscode2 = { src = 'vscode', dst = '~/.cache/wallust/colors' }

[hooks]
# Shell commands run after every palette generation, skip all with --no-hooks
# Examples:
## reload your compositor
#picom    = "pkill -USR1 picom"
## set a random wallpaper with swww
#wallpaper = """swww img "$(find ~/Pictures/Wallpapers -type f | shuf -n 1)" """
swaync = "swaync-client -R && swaync-client -rs"
hypr = "hyprctl reload"
firefox = "pywalfox update"

[templated_hooks]
# Like [hooks] but the command is rendered as a Jinja2 template first, giving
# access to the same variables as templates: colors, wallpaper, palette, etc.
# Skip all with --no-templated-hooks.
# Examples:
# notify = "notify-send 'wallust' 'Generated from {{wallpaper | basename}} ({{palette}})' -i "
# waybar = "echo '#{background}' > /tmp/wallust-bg"
